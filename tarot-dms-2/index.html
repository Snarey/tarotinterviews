ia-haspopup="true" aria-expanded="false"><span class="navbar__toggle__box"><span class="navbar__toggle__inner">Menu</span></span></button><div class="navbar__sidebar js-sidebar"><div class="navbar__sidebar-inner"><ul class="navbar__menu"><li><a href="https://tarotinterviews.com/test-page/" target="_self">Homepage</a></li></ul></div></div></nav></header><main class="main page"><div class="wrapper"><article class="content"><header class="content__header content__inner"><h1 class="content__title">Tarot DMs</h1></header><div class="content__inner content__entry"></div></article></div></main><footer class="footer"><div class="footer__top"><div class="footer__col1"><a class="footer__logo h4" href="https://tarotinterviews.com/">Tarot Interviews</a></div><div class="footer__col2"><h3 class="h4">Test</h3><ul class="footer__nav"></ul></div><div class="footer__col3"><h3 class="h4">Test</h3><ul class="footer__nav"></ul></div><div class="footer__col4"><h3 class="h4">Test</h3><ul class="footer__nav"></ul></div></div><div class="footer__bottom"><div class="footer__copyright">© 2026 Finbarre Snarey. All rights reserved.</div></div></footer></div><script async src="https://tarotinterviews.com/assets/js/scripts.min.js?v=eea8b5e5dc283b5592706a54c004d8a2"></script><script>var images = document.querySelectorAll('img[loading]');

      for (var i = 0; i < images.length; i++) {
         if (images[i].complete) {
            images[i].classList.add('is-loaded');
            images[i].parentNode.classList.remove('is-img-loading');
         } else {
            images[i].addEventListener('load', function () {
               this.classList.add('is-loaded');
               this.parentNode.classList.remove('is-img-loading');
            }, false);
         }
      }</script><script>const excludedPlatforms = ["p-email","p-viber","p-clipboard","p-mastodon"];
				const popupWidth = 600;
				const popupHeight = 600;

				document.addEventListener("DOMContentLoaded", function() {
						const socialButtons = document.querySelectorAll(".scl-container a");
						socialButtons.forEach((button) => {
							button.addEventListener("click", function(event) {
								let platform = '';

								for (const excluded of excludedPlatforms) {
									if (this.classList.contains(excluded)) {
										 platform = excluded;
										 break;
									}
							  }

							  if (platform === 'mastodon') {
									MastodonShare(event);
							  } else if (!excludedPlatforms.includes(platform)) {
									event.preventDefault();
									const url = this.getAttribute("href");
									openCenteredPopup(url, "Share", popupWidth, popupHeight);
							  }
							});
						});

						 
				});

				function openCenteredPopup(url, title, w, h) {
						const y = window.top.outerHeight / 2 + window.top.screenY - (h / 2);
						const x = window.top.outerWidth / 2 + window.top.screenX - (w / 2);
						return window.open(url, title,
							"toolbar=no, location=no, directories=no, status=no, menubar=no, scrollbars=no, resizable=no, copyhistory=no, width=" + w + ", height=" + h + ", top=" + y + ", left=" + x
						);
				}
				
			document.addEventListener('DOMContentLoaded', () => {
				const pluginElement = document.querySelector('.scl-container');		 
				if (pluginElement) {
				let isInsidePopup = false;
				let parent = pluginElement.parentNode;
				
				while (parent && parent instanceof Element) {
					if (parent.classList.contains('.js-content__share-popup')) {
						isInsidePopup = true;
						break;
					}
					parent = parent.parentNode;
				}
			
				const clickHandler = (event) => {
					const clipboardButton = event.target.closest('[data-clipboard=true]');
					if (clipboardButton) {
						event.preventDefault();
						const textToCopy = window.location.href;
						navigator.clipboard.writeText(textToCopy)
						.then(() => {
							alert('URL copied to clipboard');
						})
						.catch(err => {
							console.error('Failed to copy text', err);
						});
					}
				};
			
				if (isInsidePopup) {
					parent.addEventListener('click', clickHandler);
				} else {
					pluginElement.addEventListener('click', clickHandler);
				}
				}
			});
		
				
			function MastodonShare(e) {
				const title = e.target.getAttribute("data-title") || e.currentTarget.getAttribute("data-title");
				const url = e.target.getAttribute("data-url") || e.currentTarget.getAttribute("data-url");
				const excerpt = e.target.getAttribute("data-excerpt") || e.currentTarget.getAttribute("data-excerpt");

				if (!title || !url) {
						console.error('Mastodon share attributes not found');
						return;
				}

				const mastodonDomainLabel = "Enter your Mastodon domain"; // Use the customizable label
				const domain = prompt(mastodonDomainLabel, "mastodon.social"); // Use the customizable label in the prompt

				if (!domain) {
						console.error('Mastodon domain not provided');
						return;
				}

				const textToShare = `${title} ${excerpt} ${url}`;
				const shareUrl = "https://" + domain + "/share?text=" + textToShare;
				window.open(shareUrl, '_blank');
			}</script></body></html>
